<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="/src/styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>音折</title>
    <script type="module" src="/src/main.ts" defer></script>
  </head>

  <body>
    <div id="app">
      <div class="window-frame">
        <div class="title-bar">
          <div class="window-controls">
            <button class="win-btn close" id="btn-close"></button>
            <button class="win-btn minimize" id="btn-minimize"></button>
            <button class="win-btn maximize" id="btn-maximize"></button>
          </div>
          <div class="title-text">音折</div>
        </div>

        <div class="device-container" id="device-container">
          <div class="tri-fold" id="tri-fold">
            <div class="fold left-fold" id="left-fold">
              <div class="fold-content">
                <div class="left-panel">
                  <div class="panel-header">
                    <div class="logo-mark">音</div>
                    <span class="app-name">音折</span>
                  </div>
                  <nav class="side-nav" id="side-nav">
                    <a class="nav-item active" data-section="library" data-view="library">
                      <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
                      <span>音乐库</span>
                    </a>
                    <a class="nav-item" data-section="favorites" data-view="favorites">
                      <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                      <span>收藏</span>
                    </a>
                    <a class="nav-item" data-section="notes" data-view="notes">
                      <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
                      <span>笔记</span>
                    </a>
                  </nav>
                  <div class="playlist-section-compact">
                    <div class="playlist-header">
                      <span>播放队列</span>
                      <span class="playlist-count" id="playlist-count">0 首</span>
                    </div>
                    <div class="playlist-list" id="playlist-list">
                      <div class="empty-playlist">
                        <p>暂无歌曲</p>
                        <button class="add-music-btn" id="btn-add-music">添加本地音乐</button>
                        <button class="add-music-btn" id="btn-scan-folder" style="margin-top:8px">扫描文件夹</button>
                      </div>
                    </div>
                  </div>
                  <div class="panel-footer">
                    <div class="mini-player-hint" id="btn-collapse-hint">
                      <svg viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
                      <span>点击折叠</span>
                    </div>
                  </div>
                </div>
              </div>
            </div>

            <div class="fold center-fold" id="center-fold">
              <div class="fold-content">
                <div class="main-panel" id="main-panel">
                  <div class="compact-view" id="compact-view">
                    <div class="album-art-container">
                      <div class="album-art" id="album-art">
                        <div class="album-placeholder">
                          <svg viewBox="0 0 24 24" width="64" height="64"><path fill="currentColor" d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
                        </div>
                      </div>
                      <div class="vinyl-grooves"></div>
                    </div>
                    <div class="track-info-compact">
                      <h2 class="track-title" id="track-title">选择音乐</h2>
                      <p class="track-artist" id="track-artist">未知艺术家</p>
                    </div>
                    <div class="progress-section">
                      <div class="progress-bar" id="progress-bar">
                        <div class="progress-fill" id="progress-fill"></div>
                        <div class="progress-handle" id="progress-handle"></div>
                      </div>
                      <div class="time-display">
                        <span id="current-time">0:00</span>
                        <span id="total-time">0:00</span>
                      </div>
                    </div>
                    <div class="controls-compact">
                      <button class="ctrl-btn" id="btn-shuffle">
                        <svg viewBox="0 0 24 24" width="22" height="22"><path fill="currentColor" d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"/></svg>
                      </button>
                      <button class="ctrl-btn" id="btn-prev">
                        <svg viewBox="0 0 24 24" width="28" height="28"><path fill="currentColor" d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
                      </button>
                      <button class="ctrl-btn play-pause" id="btn-play">
                        <svg viewBox="0 0 24 24" width="36" height="36" id="icon-play"><path fill="currentColor" d="M8 5v14l11-7z"/></svg>
                        <svg viewBox="0 0 24 24" width="36" height="36" id="icon-pause" style="display:none"><path fill="currentColor" d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                      </button>
                      <button class="ctrl-btn" id="btn-next">
                        <svg viewBox="0 0 24 24" width="28" height="28"><path fill="currentColor" d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
                      </button>
                      <button class="ctrl-btn" id="btn-repeat">
                        <svg viewBox="0 0 24 24" width="22" height="22"><path fill="currentColor" d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/></svg>
                      </button>
                    </div>
                    <div class="expand-hint">
                      <button class="expand-btn" id="btn-expand">
                        <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6 1.41-1.41z"/></svg>
                        <span>展开完整界面</span>
                      </button>
                    </div>
                  </div>

                  <div class="full-view" id="full-view">
                    <div class="full-header">
                      <button class="back-btn" id="btn-back">
                        <svg viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
                        <span>返回</span>
                      </button>
                      <div class="view-title">正在播放</div>
                      <button class="more-btn" id="btn-more-menu">
                        <svg viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M12 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/></svg>
                      </button>
                    </div>
                    <div class="full-content">
                      <div class="full-album-section">
                        <div class="full-album-art" id="full-album-art">
                          <div class="album-placeholder">
                            <svg viewBox="0 0 24 24" width="80" height="80"><path fill="currentColor" d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
                          </div>
                        </div>
                        <div class="full-track-info">
                          <h1 class="full-track-title" id="full-track-title">选择音乐</h1>
                          <p class="full-track-artist" id="full-track-artist">未知艺术家</p>
                        </div>
                      </div>
                      <div class="full-progress-section">
                        <div class="full-progress-bar" id="full-progress-bar">
                          <div class="full-progress-fill" id="full-progress-fill"></div>
                          <div class="full-progress-handle" id="full-progress-handle"></div>
                        </div>
                        <div class="full-time-display">
                          <span id="full-current-time">0:00</span>
                          <span id="full-total-time">0:00</span>
                        </div>
                      </div>
                      <div class="full-controls">
                        <button class="full-ctrl-btn" id="full-btn-shuffle">
                          <svg viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"/></svg>
                        </button>
                        <button class="full-ctrl-btn" id="full-btn-prev">
                          <svg viewBox="0 0 24 24" width="32" height="32"><path fill="currentColor" d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
                        </button>
                        <button class="full-ctrl-btn play-pause" id="full-btn-play">
                          <svg viewBox="0 0 24 24" width="48" height="48" id="full-icon-play"><path fill="currentColor" d="M8 5v14l11-7z"/></svg>
                          <svg viewBox="0 0 24 24" width="48" height="48" id="full-icon-pause" style="display:none"><path fill="currentColor" d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                        </button>
                        <button class="full-ctrl-btn" id="full-btn-next">
                          <svg viewBox="0 0 24 24" width="32" height="32"><path fill="currentColor" d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
                        </button>
                        <button class="full-ctrl-btn" id="full-btn-repeat">
                          <svg viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/></svg>
                        </button>
                      </div>
                      <div class="extra-controls">
                        <button class="extra-btn" id="btn-volume">
                          <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
                          <span>音量</span>
                        </button>
                        <button class="extra-btn" id="btn-favorite-toggle">
                          <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                          <span>收藏</span>
                        </button>
                        <button class="extra-btn" id="btn-equalizer">
                          <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M3 17v2h6v-2H3zM3 5v2h10V5H3zm10 16v-2h8v-2h-8v-2h-2v6h2zM7 9v2H3v2h4v2h2V9H7zm14 4v-2H11v2h10zm-6-4h2V7h4V5h-4V3h-2v6z"/></svg>
                          <span>均衡器</span>
                        </button>
                        <button class="extra-btn" id="btn-sleep">
                          <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M11 7h2v6h-2V7zm0 8h2v2h-2v-2zm1-9C6.48 6 2 10.48 2 16s4.48 10 10 10 10-4.48 10-10S17.52 6 12 6zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/></svg>
                          <span>定时</span>
                        </button>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>

            <div class="fold right-fold" id="right-fold">
              <div class="fold-content">
                <div class="lyrics-panel">
                  <div class="lyrics-header">
                    <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg>
                    <span>歌词</span>
                  </div>
                  <div class="lyrics-content" id="lyrics-content">
                    <div class="lyrics-empty">
                      <svg viewBox="0 0 24 24" width="48" height="48"><path fill="currentColor" d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg>
                      <p>暂无歌词</p>
                      <span>该歌曲暂无歌词信息</span>
                    </div>
                  </div>
                  <div class="lyrics-footer">
                    <div class="lyrics-track-info">
                      <span class="lyrics-track-title" id="lyrics-track-title">选择音乐</span>
                      <span class="lyrics-track-artist" id="lyrics-track-artist">未知艺术家</span>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="dropdown-menu" id="dropdown-menu">
      <div class="dropdown-item" id="dropdown-eq">
        <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M3 17v2h6v-2H3zM3 5v2h10V5H3zm10 16v-2h8v-2h-8v-2h-2v6h2zM7 9v2H3v2h4v2h2V9H7zm14 4v-2H11v2h10zm-6-4h2V7h4V5h-4V3h-2v6z"/></svg>
        <span>音效设置</span>
      </div>
      <div class="dropdown-item" id="dropdown-theme">
        <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9c.83 0 1.5-.67 1.5-1.5 0-.39-.15-.74-.39-1.01-.23-.26-.38-.61-.38-.99 0-.83.67-1.5 1.5-1.5H16c2.76 0 5-2.24 5-5 0-4.42-4.03-8-9-8zm-5.5 9c-.83 0-1.5-.67-1.5-1.5S5.67 9 6.5 9 8 9.67 8 10.5 7.33 12 6.5 12zm3-4C8.67 8 8 7.33 8 6.5S8.67 5 9.5 5s1.5.67 1.5 1.5S10.33 8 9.5 8zm5 0c-.83 0-1.5-.67-1.5-1.5S13.67 5 14.5 5s1.5.67 1.5 1.5S15.33 8 14.5 8zm3 4c-.83 0-1.5-.67-1.5-1.5S16.67 9 17.5 9s1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/></svg>
        <span>主题设置</span>
      </div>
    </div>

    <div class="overlay" id="overlay"></div>

    <div class="side-drawer" id="eq-drawer">
      <div class="drawer-header">
        <span>音效设置</span>
        <button class="drawer-close" id="eq-drawer-close">
          <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
        </button>
      </div>
      <div class="drawer-content">
        <div class="eq-section">
          <div class="eq-header">均衡器预设</div>
          <div class="eq-presets">
            <button class="preset-btn active">标准</button>
            <button class="preset-btn">流行</button>
            <button class="preset-btn">摇滚</button>
            <button class="preset-btn">古典</button>
            <button class="preset-btn">爵士</button>
          </div>
        </div>
        <div class="eq-section">
          <div class="eq-header">播放设置</div>
          <div class="setting-item">
            <span>淡入淡出</span>
            <label class="toggle">
              <input type="checkbox" checked>
              <span class="toggle-slider"></span>
            </label>
          </div>
          <div class="setting-item">
            <span>无缝播放</span>
            <label class="toggle">
              <input type="checkbox">
              <span class="toggle-slider"></span>
            </label>
          </div>
          <div class="setting-item">
            <span>跳过静音</span>
            <label class="toggle">
              <input type="checkbox" checked>
              <span class="toggle-slider"></span>
            </label>
          </div>
        </div>
      </div>
    </div>

    <div class="side-drawer" id="volume-drawer">
      <div class="drawer-header">
        <span>音量控制</span>
        <button class="drawer-close" id="volume-drawer-close">
          <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
        </button>
      </div>
      <div class="drawer-content">
        <div class="eq-section">
          <div class="eq-header">主音量</div>
          <div class="volume-slider-container">
            <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M3 9v6h4l5 5V4L7 9H3z"/></svg>
            <input type="range" class="volume-slider" id="volume-slider" min="0" max="100" value="80">
            <span class="volume-value" id="volume-value">80%</span>
          </div>
        </div>
      </div>
    </div>

    <div class="side-drawer" id="sleep-drawer">
      <div class="drawer-header">
        <span>定时关闭</span>
        <button class="drawer-close" id="sleep-drawer-close">
          <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
        </button>
      </div>
      <div class="drawer-content">
        <div class="eq-section">
          <div class="eq-header">设置定时</div>
          <div class="sleep-presets">
            <button class="preset-btn sleep-preset" data-min="15">15分钟</button>
            <button class="preset-btn sleep-preset" data-min="30">30分钟</button>
            <button class="preset-btn sleep-preset" data-min="45">45分钟</button>
            <button class="preset-btn sleep-preset" data-min="60">60分钟</button>
          </div>
        </div>
        <div class="eq-section">
          <div class="eq-header">当前状态</div>
          <div class="sleep-status" id="sleep-status">未设置定时</div>
          <button class="preset-btn" id="btn-cancel-sleep" style="margin-top:10px;display:none">取消定时</button>
        </div>
      </div>
    </div>

    <div class="side-drawer" id="note-drawer">
      <div class="drawer-header">
        <span id="note-drawer-title">写笔记</span>
        <button class="drawer-close" id="note-drawer-close">
          <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
        </button>
      </div>
      <div class="drawer-content">
        <div class="eq-section">
          <div class="eq-header">关联歌曲</div>
          <div class="note-song-info" id="note-song-info">未选择歌曲</div>
        </div>
        <div class="eq-section">
          <div class="eq-header">笔记内容</div>
          <textarea class="note-textarea" id="note-textarea" placeholder="记录你的听歌心得..."></textarea>
        </div>
        <div class="eq-section">
          <button class="preset-btn active" id="btn-save-note" style="width:100%">保存笔记</button>
          <button class="preset-btn" id="btn-delete-note" style="width:100%;margin-top:8px;display:none;color:#ff4757;border-color:#ff4757">删除笔记</button>
        </div>
      </div>
    </div>

    <div class="side-drawer" id="theme-drawer">
      <div class="drawer-header">
        <span>主题设置</span>
        <button class="drawer-close" id="theme-drawer-close">
          <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
        </button>
      </div>
      <div class="drawer-content">
        <div class="eq-section">
          <div class="eq-header">外观模式</div>
          <div class="theme-options">
            <div class="theme-option" data-theme="light">
              <div class="theme-preview theme-light-preview"></div>
              <span>浅色</span>
            </div>
            <div class="theme-option" data-theme="dark">
              <div class="theme-preview theme-dark-preview"></div>
              <span>深色</span>
            </div>
            <div class="theme-option" data-theme="auto">
              <div class="theme-preview theme-auto-preview"></div>
              <span>跟随系统</span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <input type="file" id="file-input" accept="audio/*" multiple style="display:none">
  </body>
</html>
