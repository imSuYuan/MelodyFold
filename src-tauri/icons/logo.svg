<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2C9CF0"/>
      <stop offset="100%" stop-color="#1E6FD9"/>
    </linearGradient>
    <linearGradient id="foldL" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5BC0FF"/>
      <stop offset="100%" stop-color="#3AA8F5"/>
    </linearGradient>
    <linearGradient id="foldR" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4AB3FF"/>
      <stop offset="100%" stop-color="#2C9CF0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect x="64" y="64" width="896" height="896" rx="224" ry="224" fill="url(#bg)"/>

  <!-- Three-fold music note design -->
  <g transform="translate(512, 512)">
    <!-- Left fold -->
    <path d="M-200 120 L-200 -120 L-40 -200 L-40 40 Z" fill="url(#foldL)" opacity="0.9"/>
    <!-- Center fold (main) -->
    <path d="M-40 40 L-40 -200 L120 -280 L120 -40 Z" fill="#FFFFFF"/>
    <!-- Right fold -->
    <path d="M120 -40 L120 -280 L200 -240 L200 0 Z" fill="url(#foldR)" opacity="0.85"/>

    <!-- Note head -->
    <ellipse cx="-120" cy="180" rx="70" ry="55" fill="#FFFFFF" transform="rotate(-12 -120 180)"/>

    <!-- Center fold detail lines -->
    <path d="M-20 -160 L-20 20" stroke="#E8F4FD" stroke-width="12" stroke-linecap="round"/>
    <path d="M40 -190 L40 -10" stroke="#E8F4FD" stroke-width="12" stroke-linecap="round"/>
    <path d="M100 -220 L100 -40" stroke="#E8F4FD" stroke-width="10" stroke-linecap="round"/>
  </g>

  <!-- Decorative sound waves at bottom -->
  <path d="M 280 780 Q 512 720 744 780" stroke="rgba(255,255,255,0.2)" stroke-width="16" fill="none" stroke-linecap="round"/>
  <path d="M 360 840 Q 512 800 664 840" stroke="rgba(255,255,255,0.12)" stroke-width="12" fill="none" stroke-linecap="round"/>
</svg>
